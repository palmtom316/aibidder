services:
  api:
    build:
      context: ./services/api-server
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "${AIBIDDER_API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build:
      context: ./services/worker
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  web:
    build:
      context: ./src/frontend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${AIBIDDER_WEB_PORT:-3000}:3000"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aibidder
      POSTGRES_USER: aibidder
      POSTGRES_PASSWORD: aibidder
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aibidder -d aibidder"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "${AIBIDDER_POSTGRES_PORT:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${AIBIDDER_REDIS_PORT:-16379}:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "${AIBIDDER_MINIO_API_PORT:-19000}:9000"
      - "${AIBIDDER_MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
