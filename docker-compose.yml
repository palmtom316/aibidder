version: "3.9"

services:
  api:
    build:
      context: ./services/api-server
    env_file:
      - .env.example
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    build:
      context: ./services/worker
    env_file:
      - .env.example
    depends_on:
      - postgres
      - redis
      - minio

  web:
    build:
      context: ./src/frontend
    ports:
      - "3000:3000"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aibidder
      POSTGRES_USER: aibidder
      POSTGRES_PASSWORD: aibidder
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
